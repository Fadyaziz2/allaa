name: invoicex
description: A new Flutter project.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

#==== Dependencies start ====#
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  get: ^4.6.6
  shared_preferences: ^2.2.2
  flutter_launcher_icons: ^0.13.1
  flutter_svg: ^2.0.9
  shimmer_animation: ^2.1.0+1
  http: ^1.1.0
  intl: ^0.19.0
  fl_chart: ^0.65.0
  carousel_slider: ^5.0.0
  dotted_border: ^2.1.0
  file_picker: ^10.1.9
  image_picker:
  syncfusion_flutter_charts: ^27.1.50
  pin_code_fields: ^8.0.1
  country_picker: ^2.0.25
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  flutter_paypal: ^0.2.1
  razorpay_flutter: ^1.4.0
  flutter_stripe: ^10.2.0
  flutter_local_notifications: ^17.2.1
  firebase_core: ^2.0.0
  firebase_messaging: ^14.0.0
  flutter_pdfview: ^1.3.2
  open_filex: ^4.7.0
  fluttertoast: ^8.2.12
  share_plus: ^11.0.0
  flutter_sslcommerz: ^2.3.6

#==== Dev Dependencies start ====#
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

#==== App Icon Section ====#
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo.png"

flutter:
  uses-material-design: true

  #==== Assets start ====#
  assets:
    - assets/
    - assets/image/
    - assets/icon/
    - assets/icon/flag/
    - assets/logo/
    - assets/language/

  #==== FONT start ====#
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/font/Poppins-Regular.ttf
          weight: 400
        - asset: assets/font/Poppins-Medium.ttf
          weight: 500
        - asset: assets/font/Poppins-Bold.ttf
          weight: 700
        - asset: assets/font/Poppins-Black.ttf
          weight: 900
